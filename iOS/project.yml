name: Sicknote
options:
  bundleIdPrefix: com.shimondeitel.sicknote
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sicknote:
    type: application
    platform: iOS
    sources:
      - path: Sicknote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sicknote
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sicknote/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SicknoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SicknoteTests
      - path: Sicknote.storekit
    dependencies:
      - target: Sicknote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sicknote.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SicknoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SicknoteUITests
    dependencies:
      - target: Sicknote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sicknote.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sicknote:
    build:
      targets:
        Sicknote: all
        SicknoteTests: [test]
        SicknoteUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sicknote.storekit
    test:
      config: Debug
      storeKitConfiguration: Sicknote.storekit
      targets:
        - SicknoteTests
        - SicknoteUITests
    archive:
      config: Release
